name: "release"

on:
  push:
    tags:
      - "v*"

env:
  CN_APPLICATION: "frstudios/strata"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  draft:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: create CrabNebula draft release
        uses: crabnebula-dev/cloud-release@v0
        with:
          command: release draft ${{ env.CN_APPLICATION }} --framework tauri
          api-key: ${{ secrets.CN_API_KEY }}

  build-linux:
    name: Build AppImage & upload to CrabNebula
    needs: draft
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> src-tauri/target"

      - name: install linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev xdg-utils libfuse2

      - name: install frontend dependencies
        run: npm ci

      # updater feature + createUpdaterArtifacts produces the signed .AppImage.tar.gz + .sig
      # pair CrabNebula's auto-update flow expects. Key is passphrase-protected.
      - name: build AppImage
        env:
          NO_STRIP: true
          APPIMAGE_EXTRACT_AND_RUN: 1
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: >-
          npm run tauri build --
          --features updater
          --config '{"bundle":{"targets":["appimage"],"createUpdaterArtifacts":true}}'

      - name: upload AppImage to CrabNebula
        uses: crabnebula-dev/cloud-release@v0
        with:
          command: release upload ${{ env.CN_APPLICATION }} --framework tauri
          api-key: ${{ secrets.CN_API_KEY }}
          path: ./src-tauri

  build-windows:
    name: Build MSI (Store + CrabNebula fallback) & upload to CrabNebula
    needs: draft
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> src-tauri/target"

      - name: install frontend dependencies
        run: npm ci

      # Same signing identity as Linux: this MSI is the exact artifact submitted to the
      # Microsoft Store, and ALSO the one sold directly via CrabNebula/your webpage if the
      # Store rejects it or as an ongoing alternative channel — that copy has no storefront
      # managing updates for it, so it needs the updater wired in same as Linux.
      # Offline WebView2 installer mode is required either way for Store submission.
      - name: build MSI
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: >-
          npm run tauri build --
          --features updater
          --config '{"bundle":{"targets":["msi"],"createUpdaterArtifacts":true,"windows":{"webviewInstallMode":{"type":"offlineInstaller"}}}}'

      - name: upload MSI to CrabNebula
        uses: crabnebula-dev/cloud-release@v0
        with:
          command: release upload ${{ env.CN_APPLICATION }} --framework tauri
          api-key: ${{ secrets.CN_API_KEY }}
          path: ./src-tauri

  publish:
    name: Publish CrabNebula release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: publish CrabNebula release
        uses: crabnebula-dev/cloud-release@v0
        with:
          command: release publish ${{ env.CN_APPLICATION }} --framework tauri
          api-key: ${{ secrets.CN_API_KEY }}
